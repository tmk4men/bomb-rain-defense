  <meta name="theme-color" content="#0b0818" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="style.css?v=10" />
</head>
<body>
  <div class="crt">
    <div id="app">
      <div id="stage">
        <canvas id="game" width="480" height="642"></canvas>

        <!-- ハンバーガーメニューボタン(ゲーム中のみ表示) -->
        <button id="menuBtn" class="menu-btn" aria-label="メニュー" aria-expanded="false" title="メニュー">
          <span></span><span></span><span></span>
        </button>

        <!-- ホーム画面 -->
        <div id="home" class="screen">
          <div class="home-inner">
            <h1>UFO SMASH!</h1>
            <p class="ranks-title">BEST 3</p>
            <ol id="homeRanks" class="ranks"></ol>
            <button id="startBtn">START</button>
          </div>
        </div>

        <!-- メニュー(あそびかた) -->
        <div id="menu" class="screen hidden">
          <div class="panel">
            <h2>あそびかた</h2>
            <ul>
              <li>玉を<b>引いて離す</b>と発射（貫通）。</li>
              <li><b>UFO</b>を撃ち落として<b>人々</b>を守れ。</li>
              <li>全員やられたら<b>ゲームオーバー</b>。</li>
            </ul>
            <div class="menu-actions">
              <button id="resumeBtn">とじる</button>
              <button id="bgmBtn" class="btn-sm">BGM: ON</button>
              <button id="fsBtn" class="btn-sm">フルスクリーン</button>
              <button id="homeBtn" class="btn-sm">ホームへ</button>
            </div>
          </div>
        </div>

        <!-- ゲームオーバー画面 -->
        <div id="gameover" class="screen hidden">
          <div class="panel">
            <h2>GAME OVER</h2>
            <p class="score-line">SCORE <span id="finalScore">0</span></p>
            <p class="ranks-title">BEST 3</p>
            <ol id="goRanks" class="ranks"></ol>
            <button id="retryBtn">RETRY</button>
            <div class="menu-actions">
              <button id="shareBtn" class="btn-sm">スコアを共有</button>
              <button id="toHomeBtn" class="btn-sm">ホームへ</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>
  <script src="game.js?v=10"></script>
</body>
</html>
