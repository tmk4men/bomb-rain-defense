  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ボムレイン・ディフェンス（BOMB RAIN DEFENSE）" />

<body>
  <div class="crt">
    <div id="app">
      <h1>BOMB RAIN</h1>
      <p class="subtitle">ボムレイン・ディフェンス</p>

      <div id="stage">
        <canvas id="game" width="480" height="642"></canvas>

        <!-- スタート画面 -->
        <div id="overlay" class="screen">
          <div class="panel">
            <h2>あそびかた</h2>
            <ul>
              <li>パチンコの玉を<b>ドラッグで引いて離す</b>と発射！</li>
              <li>玉は<b>貫通</b>。1発で複数倒すと<b>コンボ得点</b>（最大×5）。</li>
              <li>空から降る<b>ボムへい</b>を撃ち落として<b>花ばたけ</b>を守れ。</li>
              <li>花に当たると花が枯れる。全部枯れたら<b>ゲームオーバー</b>。</li>
            </ul>
            <div class="legend">
              <div class="lg"><span class="ico ico-bomb"></span>ノーマル 100</div>
              <div class="lg"><span class="ico ico-fast"></span>スピード 150</div>
              <div class="lg"><span class="ico ico-armor"></span>てつ甲 ×2発 300</div>
              <div class="lg"><span class="ico ico-gold"></span>ゴールド 500</div>
            </div>
            <button id="startBtn">START</button>
          </div>
        </div>

        <!-- ゲームオーバー画面 -->
        <div id="gameover" class="screen hidden">
          <div class="panel">
            <h2>GAME OVER</h2>
            <p class="score-line">SCORE <span id="finalScore">0</span></p>
            <p class="score-line best">BEST <span id="bestScore">0</span></p>
            <button id="retryBtn">RETRY</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js?v=2"></script>
</body>
</html>
